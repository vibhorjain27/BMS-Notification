name: BMS Ticket Watcher — Dhurandhar Mar 19

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes (GitHub's minimum interval)
  workflow_dispatch:          # Manual trigger from GitHub Actions tab

jobs:
  check-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check BookMyShow availability
        env:
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python bms_watcher.py
