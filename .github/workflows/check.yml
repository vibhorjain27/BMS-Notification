name: BMS Ticket Watcher — Dhurandhar Mar 19

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send a test email to verify Gmail works'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  check-tickets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check BookMyShow & alert via Gmail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: python bms_watcher.py
